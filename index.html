<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ABSENSI SISWA ONLINE - PORTAL SEKOLAH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d9488">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://jmtyhlpnzposejasobcv.supabase.co/storage/v1/object/public/logo/logo%20alqom%20baru.png">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        tosca: '#0d9488', 
                        gold: '#d97706',  
                        'gold-light': '#fbbf24',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0fdfa; -webkit-tap-highlight-color: transparent; }
        .sidebar-item-active { background-color: #0d9488; color: white; box-shadow: 0 10px 15px -3px rgba(13, 148, 136, 0.3); }
        .custom-scroll { scrollbar-width: thin; scrollbar-color: #0d9488 transparent; }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #0d9488; border-radius: 10px; }
        .modal-overlay { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(8px); }
        #reader { border-radius: 24px; overflow: hidden; border: 4px solid #0d9488 !important; }
        .gold-gradient { background: linear-gradient(135deg, #d97706 0%, #f59e0b 100%); }
        .tosca-gradient { background: linear-gradient(135deg, #0d9488 0%, #14b8a6 100%); }
        
        @media (max-width: 768px) {
            .mobile-sidebar { transform: translateX(-100%); transition: transform 0.3s ease-in-out; }
            .mobile-sidebar.open { transform: translateX(0); }
            .content-container { padding: 1rem !important; }
        }
    </style>
</head>
<body class="text-slate-800 antialiased overflow-hidden">

    <div id="sidebar-overlay" onclick="window.toggleMobileMenu()" class="fixed inset-0 bg-slate-900/50 z-[45] hidden backdrop-blur-sm"></div>

    <div id="app" class="flex h-screen w-full overflow-hidden">
        <!-- Sidebar -->
        <aside id="sidebar" class="w-72 bg-white border-r border-teal-100 fixed md:relative h-full z-50 flex flex-col shrink-0 shadow-2xl md:shadow-none mobile-sidebar">
            <div class="p-6 border-b border-teal-50">
                <div class="flex flex-col items-center text-center gap-3">
                    <img id="school-logo" src="https://jmtyhlpnzposejasobcv.supabase.co/storage/v1/object/public/logo/logo%20alqom%20baru.png" 
                         alt="Logo Sekolah" class="w-16 h-16 md:w-20 md:h-20 object-contain rounded-2xl shadow-lg border-2 border-gold"
                         onerror="this.src='https://placehold.co/200x200/0d9488/ffffff?text=LOGO'">
                    <div>
                        <h1 class="text-base md:text-lg font-black text-tosca leading-tight tracking-tighter uppercase">Absensi Siswa</h1>
                        <h1 class="text-base md:text-lg font-black text-gold leading-tight tracking-tighter uppercase">Online</h1>
                    </div>
                </div>
            </div>
            
            <nav class="flex-1 p-4 space-y-1.5 overflow-y-auto custom-scroll" id="nav-links"></nav>

            <div class="p-4 border-t border-teal-50">
                <div class="bg-teal-50 p-4 rounded-2xl flex items-center gap-3">
                    <div id="status-dot" class="w-2.5 h-2.5 rounded-full bg-amber-400 animate-pulse"></div>
                    <span id="status-text" class="text-[9px] font-black text-tosca uppercase">Menghubungkan...</span>
                </div>
            </div>
        </aside>

        <!-- Main Area -->
        <main class="flex-1 flex flex-col min-w-0 bg-slate-50 overflow-hidden">
            <header class="bg-white/80 backdrop-blur-md border-b border-teal-100 p-4 flex justify-between items-center shrink-0 z-40">
                <div class="flex items-center gap-3">
                    <button onclick="window.toggleMobileMenu()" class="md:hidden p-2 text-tosca hover:bg-teal-50 rounded-xl">
                        <i data-lucide="menu"></i>
                    </button>
                    <h2 id="page-title" class="text-[10px] md:text-xs font-black text-teal-600/50 uppercase tracking-[0.2em]">Dashboard</h2>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="window.fetchData()" class="p-2.5 bg-white border border-teal-100 rounded-xl text-tosca shadow-sm active:scale-95 transition-all">
                        <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                    </button>
                </div>
            </header>

            <div id="content" class="flex-1 overflow-y-auto p-4 md:p-8 custom-scroll content-container"></div>
        </main>
    </div>

    <!-- Modals -->
    <div id="edit-modal" class="fixed inset-0 z-[100] modal-overlay hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-[2rem] md:rounded-[2.5rem] shadow-2xl overflow-hidden border border-teal-100">
            <div class="p-6 md:p-8 border-b border-teal-50 flex justify-between items-center bg-teal-50/50">
                <h3 id="modal-title" class="text-lg md:text-xl font-black text-tosca">Edit Data</h3>
                <button onclick="window.closeModal()" class="p-2 hover:bg-teal-100 rounded-full text-tosca/50"><i data-lucide="x"></i></button>
            </div>
            <div id="modal-body" class="p-6 md:p-8 max-h-[70vh] overflow-y-auto custom-scroll"></div>
        </div>
    </div>

    <div id="notification-container" class="fixed bottom-4 right-4 left-4 md:left-auto md:bottom-8 md:right-8 z-[200] flex flex-col gap-3"></div>
    <div id="qr-hidden-container" class="hidden"></div>
    <input type="file" id="excel-input" class="hidden" accept=".xlsx, .xls" onchange="window.handleExcelImport(event)">

    <script type="module">
        const SUPABASE_URL = 'https://jmtyhlpnzposejasobcv.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_OSleH0Z2_JjVnRx92O6c_Q_s19_ZGdL'; 
        
        const cleanURL = SUPABASE_URL.split('/rest/v1')[0];
        const supabaseClient = window.supabase.createClient(cleanURL, SUPABASE_ANON_KEY);

        const state = {
            classes: [], students: [], attendance: [], journals: [], achievements: [],
            settings: { check_in_start: '06:00', check_in_end: '08:00', check_out_start: '14:00', check_out_end: '17:00' },
            currentPage: 'dashboard', isLoading: true, manualMode: 'check_in', absensiType: 'manual',
            currentSearch: '', selectedClass: '', scanner: null, isMenuOpen: false
        };
        window.state = state;

        const pages = [
            { id: 'dashboard', label: 'Dashboard', icon: 'layout-dashboard' },
            { id: 'classes', label: 'Data Kelas', icon: 'door-open' },
            { id: 'students', label: 'Data Siswa', icon: 'users' },
            { id: 'attendance', label: 'Absensi', icon: 'check-square' },
            { id: 'journals', label: 'Jurnal Guru', icon: 'book-open' },
            { id: 'achievements', label: 'Prestasi', icon: 'award' },
            { id: 'settings', label: 'Pengaturan', icon: 'settings' }
        ];

        window.toggleMobileMenu = () => {
            state.isMenuOpen = !state.isMenuOpen;
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            if (state.isMenuOpen) {
                sidebar.classList.add('open');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.remove('open');
                overlay.classList.add('hidden');
            }
        };

        window.navigate = (pageId) => {
            if (state.isMenuOpen) window.toggleMobileMenu();
            if(state.scanner) { 
                state.scanner.stop().then(() => {
                    state.scanner = null;
                    state.currentPage = pageId;
                    render();
                }).catch(() => {
                    state.scanner = null;
                    state.currentPage = pageId;
                    render();
                });
            } else {
                state.currentPage = pageId;
                render();
            }
        };

        window.fetchData = async () => {
            state.isLoading = true; render();
            try {
                const today = new Date().toISOString().split('T')[0];
                const [cl, st, at, se, jr, ac] = await Promise.all([
                    supabaseClient.from('classes').select('*').order('name'),
                    supabaseClient.from('students').select('*, classes(name)').order('name'),
                    supabaseClient.from('attendance').select('*').eq('date', today),
                    supabaseClient.from('settings').select('*'),
                    supabaseClient.from('journals').select('*, classes(name)').order('created_at', { ascending: false }),
                    supabaseClient.from('achievements').select('*, students(name)').order('created_at', { ascending: false })
                ]);
                
                state.classes = cl.data || [];
                state.students = st.data || [];
                state.attendance = at.data || [];
                state.journals = jr.data || [];
                state.achievements = ac.data || [];
                if (se.data) se.data.forEach(s => state.settings[s.key] = s.value);
                
                updateStatus('online');
            } catch (e) {
                updateStatus('error');
                notify("Gagal memuat data", "error");
            } finally {
                state.isLoading = false; render();
            }
        };

        function render() {
            const nav = document.getElementById('nav-links');
            nav.innerHTML = pages.map(p => `
                <button onclick="window.navigate('${p.id}')" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all text-sm font-bold ${state.currentPage === p.id ? 'sidebar-item-active' : 'text-tosca/60 hover:bg-teal-50 active:bg-teal-100'}">
                    <i data-lucide="${p.icon}" class="w-5 h-5"></i> ${p.label}
                </button>
            `).join('');
            document.getElementById('page-title').innerText = pages.find(p => p.id === state.currentPage).label;
            window.renderContent();
        }

        window.renderContent = () => {
            const container = document.getElementById('content');
            if(state.isLoading) {
                container.innerHTML = `<div class="h-full flex items-center justify-center flex-col gap-4"><div class="w-10 h-10 border-4 border-teal-100 border-t-tosca animate-spin rounded-full"></div><p class="font-black text-tosca/30 uppercase text-[9px] tracking-widest">Sinkronisasi...</p></div>`;
                return;
            }
            const renderMap = {
                dashboard: renderDashboard, classes: renderClasses, students: renderStudents,
                attendance: renderAttendance, journals: renderJournals, achievements: renderAchievements, settings: renderSettings
            };
            renderMap[state.currentPage](container);
            lucide.createIcons();
        };

        function renderDashboard(c) {
            const hadir = state.attendance.filter(a => a.status === 'Hadir').length;
            c.innerHTML = `
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-6 mb-6 md:mb-8">
                    ${statCard('Siswa', state.students.length, 'users', 'tosca')}
                    ${statCard('Hadir', hadir, 'check-circle', 'gold')}
                    ${statCard('Jurnal', state.journals.length, 'book-open', 'tosca')}
                    ${statCard('Prestasi', state.achievements.length, 'award', 'gold')}
                </div>
                <div class="bg-white p-6 md:p-10 rounded-[2rem] md:rounded-[3rem] shadow-xl border border-teal-50 flex flex-col lg:flex-row items-center gap-6 md:gap-10">
                    <div class="flex-1 text-center lg:text-left">
                        <span class="px-4 py-1.5 bg-teal-100 text-tosca text-[9px] font-black rounded-full uppercase tracking-widest mb-4 inline-block">MA Al Qomariah Portal</span>
                        <h3 class="text-2xl md:text-4xl font-black mb-4 tracking-tighter leading-tight">Selamat Datang di <span class="text-tosca">Absensi Online</span></h3>
                        <p class="text-slate-400 text-sm md:text-base font-medium leading-relaxed mb-6">Kelola kehadiran, jurnal harian, dan pantau prestasi siswa dengan mudah melalui smartphone Anda.</p>
                        <div class="flex flex-col sm:flex-row gap-3 justify-center lg:justify-start">
                            <button onclick="window.navigate('attendance')" class="px-6 py-4 tosca-gradient text-white rounded-2xl font-bold text-sm shadow-lg active:scale-95 transition-all">Mulai Absen</button>
                            <button onclick="window.navigate('journals')" class="px-6 py-4 bg-white border-2 border-teal-100 text-tosca rounded-2xl font-bold text-sm active:scale-95 transition-all">Buka Jurnal</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function statCard(t, v, i, theme) {
            const iconBg = theme === 'tosca' ? 'tosca-gradient' : 'gold-gradient';
            return `
                <div class="bg-white p-4 md:p-6 rounded-2xl md:rounded-[2rem] border border-teal-50 shadow-sm flex flex-col md:flex-row items-center md:items-center gap-3 md:gap-5 text-center md:text-left">
                    <div class="w-10 h-10 md:w-14 md:h-14 ${iconBg} text-white rounded-xl md:rounded-2xl flex items-center justify-center shrink-0 shadow-lg"><i data-lucide="${i}" class="w-5 h-5 md:w-6 md:h-6"></i></div>
                    <div class="min-w-0"><p class="text-[8px] md:text-[10px] font-black uppercase text-slate-400 mb-0.5 truncate">${t}</p><p class="text-lg md:text-2xl font-black text-slate-800">${v}</p></div>
                </div>`;
        }

        function renderAttendance(c) {
            c.innerHTML = `
                <div class="space-y-6">
                    <div class="flex bg-white p-1.5 rounded-2xl shadow-sm border border-teal-50 w-full max-w-sm mx-auto">
                        <button onclick="window.state.absensiType='manual'; window.renderContent()" class="flex-1 py-3 rounded-xl text-[10px] font-black uppercase transition-all ${state.absensiType === 'manual' ? 'tosca-gradient text-white shadow-lg' : 'text-tosca/50'}">Manual SIA</button>
                        <button onclick="window.state.absensiType='qr'; window.renderContent()" class="flex-1 py-3 rounded-xl text-[10px] font-black uppercase transition-all ${state.absensiType === 'qr' ? 'tosca-gradient text-white shadow-lg' : 'text-tosca/50'}">QR Scanner</button>
                    </div>
                    ${state.absensiType === 'manual' ? renderManualAttendance() : renderQRScanner()}
                </div>`;
        }

        function renderManualAttendance() {
            const filtered = state.students.filter(s => s.class_id === state.selectedClass);
            return `
                <div class="bg-white p-5 md:p-8 rounded-[2rem] md:rounded-[2.5rem] border border-teal-50 shadow-xl">
                    <div class="flex flex-col gap-4 mb-6 md:mb-8">
                        <div class="flex bg-teal-50 p-1.5 rounded-xl w-full">
                            <button onclick="window.state.manualMode='check_in'; window.renderContent()" class="flex-1 py-2 text-[10px] font-black rounded-lg transition-all ${state.manualMode === 'check_in' ? 'bg-white shadow text-tosca' : 'text-tosca/40'}">SESI MASUK</button>
                            <button onclick="window.state.manualMode='check_out'; window.renderContent()" class="flex-1 py-2 text-[10px] font-black rounded-lg transition-all ${state.manualMode === 'check_out' ? 'bg-white shadow text-tosca' : 'text-tosca/40'}">SESI PULANG</button>
                        </div>
                        <select onchange="window.state.selectedClass=this.value; window.renderContent()" class="w-full p-4 bg-teal-50 border-none rounded-xl font-bold text-xs text-tosca outline-none shadow-inner appearance-none">
                            <option value="">-- Pilih Kelas --</option>
                            ${state.classes.map(cl => `<option value="${cl.id}" ${state.selectedClass === cl.id ? 'selected' : ''}>${cl.name}</option>`).join('')}
                        </select>
                    </div>
                    
                    <div class="overflow-x-auto -mx-5 px-5">
                        <table class="w-full min-w-[600px]">
                            <thead><tr class="text-left text-[9px] font-black text-tosca/40 uppercase tracking-widest border-b border-teal-50"><th class="py-3">Siswa</th><th class="py-3 text-center">Status</th><th class="py-3">Keterangan</th><th class="py-3 text-right">WA</th></tr></thead>
                            <tbody class="divide-y divide-teal-50">
                                ${filtered.map(s => {
                                    const att = state.attendance.find(a => a.student_id === s.id);
                                    return `<tr class="active:bg-teal-50 transition-all">
                                        <td class="py-4"><p class="font-bold text-xs md:text-sm text-slate-700 leading-tight">${s.name}</p><p class="text-[8px] font-bold text-slate-400 mt-0.5">${s.nisn}</p></td>
                                        <td class="py-4 text-center">
                                            <select onchange="window.markAttendance('${s.id}', this.value)" class="p-2 bg-white border border-teal-100 rounded-lg text-[9px] font-black uppercase text-tosca shadow-sm outline-none">
                                                <option value="Hadir" ${att?.status === 'Hadir' ? 'selected' : ''}>Hadir</option>
                                                <option value="Sakit" ${att?.status === 'Sakit' ? 'selected' : ''}>Sakit</option>
                                                <option value="Izin" ${att?.status === 'Izin' ? 'selected' : ''}>Izin</option>
                                                <option value="Alpa" ${att?.status === 'Alpa' ? 'selected' : ''}>Alpa</option>
                                            </select>
                                        </td>
                                        <td class="py-4"><input placeholder="..." value="${att?.notes || ''}" onblur="window.markAttendance('${s.id}', null, this.value)" class="w-full p-2 bg-teal-50 border-none rounded-lg text-[9px] font-bold outline-none focus:bg-white focus:ring-1 ring-teal-200"></td>
                                        <td class="py-4 text-right"><button onclick="window.sendWA('${s.name}', '${s.parent_phone}', '${att?.status || 'Hadir'}', '${att?.notes || ''}')" class="p-2.5 bg-teal-50 text-tosca rounded-lg active:tosca-gradient active:text-white transition-all"><i data-lucide="message-circle" class="w-4 h-4"></i></button></td>
                                    </tr>`;
                                }).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>`;
        }

        window.markAttendance = async (sid, status, notes = null) => {
            const today = new Date().toISOString().split('T')[0];
            const existing = state.attendance.find(a => a.student_id === sid);
            const payload = { 
                student_id: sid, 
                date: today, 
                status: status || existing?.status || 'Hadir'
            };
            
            if(notes !== null) payload.notes = notes;
            const now = new Date().toISOString();
            if(state.manualMode === 'check_in') payload.check_in = existing?.check_in || now;
            else payload.check_out = existing?.check_out || now;

            try { 
                await supabaseClient.from('attendance').upsert(payload, { onConflict: 'student_id,date' }); 
                const idx = state.attendance.findIndex(a => a.student_id === sid);
                if(idx > -1) state.attendance[idx] = {...state.attendance[idx], ...payload};
                else state.attendance.push(payload);
                notify("Berhasil disimpan", "success"); 
            } catch (e) { notify("Gagal simpan", "error"); }
        };

        window.sendWA = (name, phone, status, notes) => {
            if(!phone) return notify("No HP Kosong", "error");
            const session = state.manualMode === 'check_in' ? 'MASUK' : 'PULANG';
            const msg = `*INFO ABSENSI*\nAnanda *${name}* hari ini tercatat Absen *${session}* dengan status: *${status.toUpperCase()}*.\n${notes ? '_Ket: ' + notes + '_' : ''}\n\nTerima kasih.`;
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
        };

        function renderQRScanner() {
            return `
                <div class="bg-white p-6 md:p-10 rounded-[2rem] border border-teal-50 shadow-xl text-center">
                    <div id="reader" class="mx-auto w-full max-w-[300px] aspect-square mb-6 bg-teal-50 flex items-center justify-center">
                        <i data-lucide="camera" class="w-10 h-10 text-tosca/20"></i>
                    </div>
                    <button id="scan-btn" onclick="window.startScanner()" class="w-full max-w-xs px-8 py-4 tosca-gradient text-white rounded-2xl font-black uppercase tracking-widest shadow-xl active:scale-95 transition-all">Mulai Scan</button>
                </div>`;
        }

        window.startScanner = async () => {
            const readerEl = document.getElementById('reader');
            const btn = document.getElementById('scan-btn');
            if (!readerEl) return;
            
            try {
                if (state.scanner) {
                    await state.scanner.stop();
                    state.scanner = null;
                    btn.innerText = "MULAI SCAN";
                    btn.classList.replace('bg-rose-500', 'tosca-gradient');
                    return;
                }
                
                state.scanner = new Html5Qrcode("reader");
                await state.scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, window.onScanSuccess);
                btn.innerText = "BERHENTIKAN SCAN";
                btn.classList.add('bg-rose-500');
                btn.classList.remove('tosca-gradient');
                notify("Kamera Aktif");
            } catch (err) { notify("Gagal akses kamera", "error"); }
        };

        window.onScanSuccess = async (decodedText) => {
            const student = state.students.find(s => s.nisn === decodedText);
            if (!student) return notify("QR Tidak Dikenali", "error");
            
            if (state.scanner) { 
                state.scanner.pause(); 
                setTimeout(() => state.scanner && state.scanner.resume(), 2000); 
            }
            await window.markAttendance(student.id, 'Hadir');
            notify(`Absen: ${student.name}`);
        };

        function renderStudents(c) {
            c.innerHTML = `
                <div class="bg-white p-5 rounded-[2rem] border border-teal-50 shadow-sm">
                    <div class="flex flex-col sm:flex-row justify-between items-center mb-6 gap-4">
                        <h3 class="text-base font-black text-tosca uppercase">Database Siswa</h3>
                        <div class="flex gap-2 w-full sm:w-auto">
                            <button onclick="window.openImportExcel()" class="flex-1 sm:flex-none px-4 py-3 bg-teal-50 text-tosca rounded-xl font-black text-[9px] uppercase border border-teal-100">Import</button>
                            <button onclick="window.openAddStudent()" class="flex-1 sm:flex-none px-4 py-3 tosca-gradient text-white rounded-xl font-black text-[9px] uppercase shadow-lg">+ Siswa</button>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                        ${state.students.map(s => `
                            <div class="bg-teal-50/30 p-4 rounded-2xl border border-teal-50 flex items-center justify-between group">
                                <div class="min-w-0">
                                    <p class="font-bold text-xs text-slate-700 truncate">${s.name}</p>
                                    <p class="text-[8px] font-black uppercase text-tosca/60 truncate">${s.classes?.name} • ${s.nisn}</p>
                                </div>
                                <div class="flex gap-1 shrink-0">
                                    <button onclick="window.downloadQR('${s.nisn}', '${s.name}')" class="p-2 bg-white text-tosca rounded-lg shadow-sm active:bg-teal-100"><i data-lucide="download" class="w-3.5 h-3.5"></i></button>
                                    <button onclick="window.deleteData('students', '${s.id}')" class="p-2 bg-white text-rose-500 rounded-lg shadow-sm active:bg-rose-50"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
                                </div>
                            </div>`).join('')}
                    </div>
                </div>`;
        }

        window.downloadQR = (nisn, name) => {
            const container = document.getElementById('qr-hidden-container');
            container.innerHTML = '';
            new QRCode(container, { text: nisn, width: 512, height: 512, colorDark: "#0d9488" });
            setTimeout(() => {
                const canvas = container.querySelector('canvas');
                const link = document.createElement('a');
                link.download = `QR_${nisn}.png`;
                link.href = canvas.toDataURL();
                link.click();
                notify("QR Disimpan");
            }, 300);
        };

        window.deleteData = async (table, id) => {
            if(!confirm("Hapus data ini?")) return;
            try { 
                await supabaseClient.from(table).delete().eq('id', id); 
                notify("Data Dihapus", "success"); window.fetchData(); 
            } catch (e) { notify("Gagal hapus", "error"); }
        };

        function renderJournals(c) {
            c.innerHTML = `
                <div class="space-y-4">
                    <div class="flex flex-col sm:flex-row justify-between items-center bg-white p-5 rounded-2xl border border-teal-50 shadow-sm gap-4">
                        <h3 class="text-base font-black text-tosca uppercase">Jurnal Guru</h3>
                        <button onclick="window.openAddJournal()" class="w-full sm:w-auto px-6 py-3 tosca-gradient text-white rounded-xl font-black text-[10px] uppercase shadow-lg">+ Buat Jurnal</button>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                        ${state.journals.map(j => `
                            <div class="bg-white border border-teal-100 p-5 rounded-2xl shadow-sm">
                                <h4 class="font-black text-slate-700 text-sm">${j.subject}</h4>
                                <p class="text-[10px] font-bold text-gold uppercase mt-1 mb-2">${j.teacher_name}</p>
                                <p class="text-[10px] text-slate-500 italic">"${j.notes || '-'}"</p>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
        }

        function renderAchievements(c) {
            c.innerHTML = `
                <div class="space-y-4">
                    <div class="flex justify-between items-center bg-white p-5 rounded-2xl border border-teal-50 shadow-sm">
                        <h3 class="text-base font-black text-gold uppercase">Daftar Prestasi</h3>
                        <button onclick="window.openAddAchievement()" class="px-4 py-3 gold-gradient text-white rounded-xl font-black text-[9px] uppercase shadow-lg">+ Prestasi</button>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                        ${state.achievements.map(a => `
                            <div class="bg-amber-50/50 border border-amber-100 p-5 rounded-2xl flex items-start gap-3">
                                <div class="w-10 h-10 gold-gradient rounded-xl flex items-center justify-center text-white shrink-0"><i data-lucide="award" class="w-5 h-5"></i></div>
                                <div><h4 class="font-black text-slate-700 text-sm">${a.title}</h4><p class="text-[9px] font-bold text-tosca uppercase mt-1">${a.students?.name}</p></div>
                            </div>`).join('')}
                    </div>
                </div>`;
        }

        function renderSettings(c) {
            c.innerHTML = `
                <div class="bg-white p-6 md:p-8 rounded-[2rem] border border-teal-50 shadow-sm max-w-md">
                    <h3 class="text-base font-black text-tosca mb-6 uppercase">Jam Operasional</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="text-[9px] font-black text-tosca uppercase">Masuk Mulai</label><input type="time" id="s-ci-s" value="${state.settings.check_in_start}" class="w-full p-4 bg-teal-50 rounded-xl"></div>
                        <div><label class="text-[9px] font-black text-tosca uppercase">Masuk Akhir</label><input type="time" id="s-ci-e" value="${state.settings.check_in_end}" class="w-full p-4 bg-teal-50 rounded-xl"></div>
                    </div>
                    <button onclick="window.updateSettings()" class="w-full tosca-gradient text-white py-4 rounded-xl font-black uppercase mt-6">Update Pengaturan</button>
                </div>`;
        }

        window.notify = (msg, type = 'success') => {
            const container = document.getElementById('notification-container');
            const el = document.createElement('div');
            el.className = `p-4 rounded-xl shadow-2xl flex items-center gap-3 text-[10px] font-black uppercase text-white transition-all ${type === 'success' ? 'tosca-gradient' : 'bg-rose-500'}`;
            el.innerHTML = `<i data-lucide="${type === 'success' ? 'check-circle' : 'alert-circle'}" class="w-4 h-4"></i> ${msg}`;
            container.appendChild(el); lucide.createIcons();
            setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 500); }, 3000);
        };

        function updateStatus(s) {
            const dot = document.getElementById('status-dot');
            const txt = document.getElementById('status-text');
            dot.className = `w-2.5 h-2.5 rounded-full ${s === 'online' ? 'bg-tosca' : 'bg-rose-500'} animate-pulse`;
            txt.innerText = s === 'online' ? 'DATABASE ONLINE' : 'KONEKSI TERPUTUS';
        }

        window.closeModal = () => document.getElementById('edit-modal').classList.add('hidden');
        document.addEventListener('DOMContentLoaded', window.fetchData);
    </script>
</body>
</html>
