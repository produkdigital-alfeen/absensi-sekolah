<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ABSENSI SISWA ONLINE</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d9488">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { tosca: '#0d9488', 'tosca-dark': '#0f766e', gold: '#d97706', 'gold-light': '#f59e0b' },
                    borderRadius: { '4xl': '2rem', '5xl': '3rem' }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .tosca-gradient { background: linear-gradient(135deg, #0d9488 0%, #14b8a6 100%); }
        .gold-gradient { background: linear-gradient(135deg, #d97706 0%, #fbbf24 100%); }
        .sidebar-item-active { background: white; color: #0d9488; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #0d9488; border-radius: 10px; }
        .modal-overlay { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(8px); }
        @media (max-width: 768px) {
            .mobile-sidebar { transform: translateX(-100%); transition: transform 0.3s ease-in-out; }
            .mobile-sidebar.open { transform: translateX(0); }
        }
    </style>
</head>
<body class="text-slate-800 antialiased overflow-hidden">
    <div id="sidebar-overlay" onclick="window.toggleMobileMenu()" class="fixed inset-0 bg-slate-900/50 z-[45] hidden backdrop-blur-sm"></div>

    <div id="app" class="flex h-screen w-full overflow-hidden">
        <aside id="sidebar" class="w-72 tosca-gradient text-white fixed md:relative h-full z-50 flex flex-col shrink-0 transition-transform mobile-sidebar shadow-2xl">
            <div class="p-8 border-b border-white/10 text-center">
                <div class="p-2 bg-white rounded-5xl shadow-xl border-4 border-gold inline-block mb-4">
                    <img id="school-logo" src="https://jmtyhlpnzposejasobcv.supabase.co/storage/v1/object/public/logo/logo%20alqom%20baru.png" 
                         alt="Logo" class="w-20 h-20 object-contain" onerror="this.src='https://placehold.co/200x200/0d9488/ffffff?text=LOGO'">
                </div>
                <h1 class="text-lg font-black leading-tight tracking-tighter uppercase">Absensi Siswa MA Al Qomariyah</h1>
                <h1 class="text-lg font-black text-gold-light leading-tight tracking-tighter uppercase">Online v1.0</h1>
            </div>
            <nav class="flex-1 p-6 space-y-2 overflow-y-auto custom-scroll" id="nav-links"></nav>
            <div class="p-6 border-t border-white/10">
                <div class="bg-white/10 p-4 rounded-2xl flex items-center gap-3">
                    <div id="status-dot" class="w-2.5 h-2.5 rounded-full bg-slate-400"></div>
                    <span id="status-text" class="text-[10px] font-bold uppercase tracking-widest text-white/70">Connecting...</span>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col min-w-0 bg-slate-50 overflow-hidden relative">
            <header class="bg-white border-b border-slate-100 p-4 flex justify-between items-center shrink-0 z-40 shadow-sm">
                <div class="flex items-center gap-4">
                    <button onclick="window.toggleMobileMenu()" class="md:hidden p-3 bg-teal-50 text-tosca rounded-2xl"><i data-lucide="menu" class="w-5 h-5"></i></button>
                    <div>
                        <h2 id="page-title" class="text-[10px] font-black text-tosca/40 uppercase tracking-[0.3em]">Dashboard</h2>
                        <p class="text-xs font-bold text-slate-400" id="current-date-display"></p>
                    </div>
                </div>
                <button onclick="window.fetchData()" class="p-3 bg-teal-50 text-tosca rounded-2xl hover:bg-teal-100 transition-all active:scale-90"><i data-lucide="refresh-cw" class="w-4 h-4"></i></button>
            </header>
            <div id="content" class="flex-1 overflow-y-auto p-4 md:p-10 custom-scroll"></div>
        </main>
    </div>

    <div id="modal" class="fixed inset-0 z-[100] modal-overlay hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-xl rounded-5xl shadow-2xl overflow-hidden border border-teal-50">
            <div class="p-8 tosca-gradient text-white flex justify-between items-center">
                <h3 id="modal-title" class="text-xl font-black uppercase tracking-tighter">Tambah Data</h3>
                <button onclick="window.closeModal()" class="p-2 hover:bg-white/20 rounded-full"><i data-lucide="x"></i></button>
            </div>
            <div id="modal-body" class="p-8 max-h-[75vh] overflow-y-auto custom-scroll bg-white"></div>
        </div>
    </div>

    <div id="notification-container" class="fixed bottom-6 right-6 left-6 md:left-auto z-[200] flex flex-col gap-3"></div>
    <div id="qr-hidden-container" class="hidden"></div>
    <input type="file" id="excel-input" class="hidden" accept=".xlsx, .xls" onchange="window.handleExcelImport(event)">

    <script type="module">
        const SUPABASE_URL = 'https://jmtyhlpnzposejasobcv.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_OSleH0Z2_JjVnRx92O6c_Q_s19_ZGdL';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const state = {
            currentPage: 'dashboard', classes: [], students: [], attendance: [],
            journals: [], achievements: [], isLoading: true, isMenuOpen: false,
            absensiType: 'manual', manualMode: 'check_in', selectedClass: '', scanner: null,
            settings: { check_in_start: '06:00', check_in_end: '08:00', check_out_start: '14:00', check_out_end: '17:00' }
        };

        const pages = [
            { id: 'dashboard', label: 'Dashboard', icon: 'layout-dashboard' },
            { id: 'classes', label: 'Data Kelas', icon: 'layers' },
            { id: 'students', label: 'Data Siswa', icon: 'users' },
            { id: 'attendance', label: 'Absensi', icon: 'user-check' },
            { id: 'journals', label: 'Jurnal Guru', icon: 'book-open' },
            { id: 'achievements', label: 'Prestasi', icon: 'award' },
            { id: 'settings', label: 'Pengaturan', icon: 'settings' }
        ];

        function startDigitalClock() {
            setInterval(() => {
                const clockEl = document.getElementById('digital-clock');
                const dateEl = document.getElementById('digital-date');
                if (clockEl || dateEl) {
                    const now = new Date();
                    if (clockEl) {
                        clockEl.innerText = now.toLocaleTimeString('id-ID', { 
                            hour: '2-digit', 
                            minute: '2-digit', 
                            second: '2-digit',
                            hour12: false 
                        });
                    }
                    if (dateEl) {
                        dateEl.innerText = new Intl.DateTimeFormat('id-ID', { 
                            dateStyle: 'full' 
                        }).format(now);
                    }
                }
            }, 1000);
        }

        window.fetchData = async () => {
            state.isLoading = true; render();
            try {
                const today = new Date().toISOString().split('T')[0];
                const [cl, st, att, jr, ach, sett] = await Promise.all([
                    supabaseClient.from('classes').select('*').order('name'),
                    supabaseClient.from('students').select('*, classes(name)').order('name'),
                    supabaseClient.from('attendance').select('*').eq('date', today),
                    supabaseClient.from('journals').select('*, classes(name)').order('created_at', { ascending: false }),
                    supabaseClient.from('achievements').select('*, students(name)').order('created_at', { ascending: false }),
                    supabaseClient.from('settings').select('*')
                ]);
                state.classes = cl.data || [];
                state.students = st.data || [];
                state.attendance = att.data || [];
                state.journals = jr.data || [];
                state.achievements = ach.data || [];
                if (sett.data) sett.data.forEach(s => state.settings[s.key] = s.value);
                document.getElementById('status-dot').className = 'w-2.5 h-2.5 rounded-full bg-emerald-400 animate-pulse';
                document.getElementById('status-text').innerText = 'Online';
            } catch (e) {
                window.notify("Koneksi Gagal", "error");
            } finally { state.isLoading = false; render(); }
        };

        window.navigate = async (pageId) => {
            if (state.isMenuOpen) window.toggleMobileMenu();
            if (state.scanner) {
                try { if (state.scanner.getState() === 2) await state.scanner.stop(); } 
                catch (err) { console.warn(err); } finally { state.scanner = null; }
            }
            state.currentPage = pageId; render();
        };

        window.toggleMobileMenu = () => {
            state.isMenuOpen = !state.isMenuOpen;
            document.getElementById('sidebar').classList.toggle('open', state.isMenuOpen);
            document.getElementById('sidebar-overlay').classList.toggle('hidden', !state.isMenuOpen);
        };

        window.closeModal = () => document.getElementById('modal').classList.add('hidden');
        
        window.notify = (msg, type = 'success') => {
            const container = document.getElementById('notification-container');
            const el = document.createElement('div');
            el.className = `p-5 rounded-2xl text-white font-bold text-xs uppercase tracking-widest shadow-2xl flex items-center gap-3 transition-all transform translate-y-10 opacity-0 ${type === 'success' ? 'tosca-gradient' : 'bg-rose-500'}`;
            el.innerHTML = `<i data-lucide="${type === 'success' ? 'check-circle' : 'alert-circle'}" class="w-4 h-4"></i> ${msg}`;
            container.appendChild(el);
            setTimeout(() => el.classList.remove('translate-y-10', 'opacity-0'), 10);
            setTimeout(() => { el.classList.add('translate-y-10', 'opacity-0'); setTimeout(() => el.remove(), 500); }, 3000);
            lucide.createIcons();
        };

        window.saveClass = async () => {
            const name = document.getElementById('m-cl-name').value.trim();
            if(!name) return;
            const { error } = await supabaseClient.from('classes').insert([{ name }]);
            if (!error) { window.notify("Kelas Disimpan"); window.closeModal(); await window.fetchData(); }
        };

        window.saveStudent = async () => {
            const payload = { 
                name: document.getElementById('m-st-name').value, nisn: document.getElementById('m-st-nisn').value, 
                class_id: document.getElementById('m-st-cl').value, gender: document.getElementById('m-st-gn').value,
                parent_phone: document.getElementById('m-st-ph').value 
            };
            const { error } = await supabaseClient.from('students').insert([payload]);
            if (!error) { window.notify("Siswa Disimpan"); window.closeModal(); await window.fetchData(); }
        };

        window.updateStudent = async (id) => {
            const payload = {
                name: document.getElementById('e-st-name').value, nisn: document.getElementById('e-st-nisn').value,
                class_id: document.getElementById('e-st-cl').value, gender: document.getElementById('e-st-gn').value,
                parent_phone: document.getElementById('e-st-ph').value
            };
            const { error } = await supabaseClient.from('students').update(payload).eq('id', id);
            if (!error) { window.notify("Berhasil Diupdate"); window.closeModal(); await window.fetchData(); }
        };

        window.deleteData = async (table, id) => {
            if (!confirm("Hapus data ini?")) return;
            const { error } = await supabaseClient.from(table).delete().eq('id', id);
            if (!error) { window.notify("Data Dihapus"); await window.fetchData(); }
        };

        window.saveJournal = async () => {
            const payload = {
                teacher_name: document.getElementById('j-teacher').value, subject: document.getElementById('j-subject').value,
                class_id: document.getElementById('j-class').value, date: document.getElementById('j-date').value,
                meeting_number: document.getElementById('j-meeting').value, topic: document.getElementById('j-topic').value,
                activity: document.getElementById('j-activity').value, absent_notes: document.getElementById('j-absent').value
            };
            const { error } = await supabaseClient.from('journals').insert([payload]);
            if (!error) { window.notify("Jurnal Disimpan"); window.closeModal(); await window.fetchData(); }
        };

        window.saveAchievement = async () => {
            const payload = {
                student_id: document.getElementById('a-student').value, title: document.getElementById('a-title').value,
                description: document.getElementById('a-desc').value
            };
            const { error } = await supabaseClient.from('achievements').insert([payload]);
            if (!error) { window.notify("Prestasi Disimpan"); window.closeModal(); await window.fetchData(); }
        };

        window.openAddStudent = () => {
            const b = document.getElementById('modal-body'); document.getElementById('modal-title').innerText = "Tambah Siswa";
            b.innerHTML = `<div class="space-y-4">
                <input type="text" id="m-st-name" placeholder="Nama Lengkap" class="w-full p-4 bg-slate-50 rounded-2xl font-black outline-none border border-slate-100">
                <input type="text" id="m-st-nisn" placeholder="NISN" class="w-full p-4 bg-slate-50 rounded-2xl font-black outline-none border border-slate-100">
                <div class="grid grid-cols-2 gap-4">
                    <select id="m-st-cl" class="w-full p-4 bg-slate-50 rounded-2xl font-black outline-none border border-slate-100">
                        ${state.classes.map(cl => `<option value="${cl.id}">${cl.name}</option>`).join('')}
                    </select>
                    <select id="m-st-gn" class="w-full p-4 bg-slate-50 rounded-2xl font-black outline-none border border-slate-100">
                        <option value="L">Laki-laki (L)</option><option value="P">Perempuan (P)</option>
                    </select>
                </div>
                <input type="text" id="m-st-ph" placeholder="No WA Orang Tua (628...)" class="w-full p-4 bg-slate-50 rounded-2xl font-black outline-none border border-slate-100">
                <button onclick="window.saveStudent()" class="w-full py-5 tosca-gradient text-white rounded-3xl font-black uppercase shadow-xl mt-4">Simpan Siswa</button>
            </div>`;
            document.getElementById('modal').classList.remove('hidden'); lucide.createIcons();
        };

        window.openEditStudent = (id) => {
            const s = state.students.find(x => x.id === id); if (!s) return;
            const b = document.getElementById('modal-body'); document.getElementById('modal-title').innerText = "Edit Data Siswa";
            b.innerHTML = `<div class="space-y-4">
                <input type="text" id="e-st-name" value="${s.name}" class="w-full p-4 bg-slate-50 rounded-2xl font-black outline-none border border-slate-100">
                <input type="text" id="e-st-nisn" value="${s.nisn}" class="w-full p-4 bg-slate-50 rounded-2xl font-black outline-none border border-slate-100">
                <div class="grid grid-cols-2 gap-4">
                    <select id="e-st-cl" class="w-full p-4 bg-slate-50 rounded-2xl font-black outline-none border border-slate-100">
                        ${state.classes.map(cl => `<option value="${cl.id}" ${s.class_id === cl.id ? 'selected' : ''}>${cl.name}</option>`).join('')}
                    </select>
                    <select id="e-st-gn" class="w-full p-4 bg-slate-50 rounded-2xl font-black outline-none border border-slate-100">
                        <option value="L" ${s.gender === 'L' ? 'selected' : ''}>Laki-laki (L)</option>
                        <option value="P" ${s.gender === 'P' ? 'selected' : ''}>Perempuan (P)</option>
                    </select>
                </div>
                <input type="text" id="e-st-ph" value="${s.parent_phone || ''}" class="w-full p-4 bg-slate-50 rounded-2xl font-black outline-none border border-slate-100">
                <button onclick="window.updateStudent('${id}')" class="w-full py-5 tosca-gradient text-white rounded-3xl font-black uppercase shadow-xl mt-4">Update Data</button>
            </div>`;
            document.getElementById('modal').classList.remove('hidden'); lucide.createIcons();
        };

        window.openAddClass = () => {
            const b = document.getElementById('modal-body'); document.getElementById('modal-title').innerText = "Tambah Kelas";
            b.innerHTML = `<div class="space-y-6"><input type="text" id="m-cl-name" placeholder="Contoh: XII RPL 1" class="w-full p-6 bg-slate-50 rounded-3xl font-black outline-none border border-slate-100"><button onclick="window.saveClass()" class="w-full py-6 tosca-gradient text-white rounded-3xl font-black uppercase shadow-xl">Simpan Kelas</button></div>`;
            document.getElementById('modal').classList.remove('hidden'); lucide.createIcons();
        };

        window.openAddJournal = () => {
            const b = document.getElementById('modal-body'); document.getElementById('modal-title').innerText = "Jurnal Guru";
            b.innerHTML = `<div class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <input type="date" id="j-date" value="${new Date().toISOString().split('T')[0]}" class="p-4 bg-slate-50 rounded-2xl font-black outline-none border">
                    <input type="number" id="j-meeting" placeholder="Pertemuan Ke" class="p-4 bg-slate-50 rounded-2xl font-black outline-none border">
                </div>
                <input type="text" id="j-teacher" placeholder="Nama Guru" class="w-full p-4 bg-slate-50 rounded-2xl font-black outline-none border">
                <input type="text" id="j-subject" placeholder="Mata Pelajaran" class="w-full p-4 bg-slate-50 rounded-2xl font-black outline-none border">
                <select id="j-class" class="w-full p-4 bg-slate-50 rounded-2xl font-black outline-none border">
                    ${state.classes.map(cl => `<option value="${cl.id}">${cl.name}</option>`).join('')}
                </select>
                <input type="text" id="j-topic" placeholder="Pokok Bahasan" class="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border">
                <textarea id="j-activity" placeholder="Kegiatan Pembelajaran" class="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border h-24"></textarea>
                <textarea id="j-absent" placeholder="Siswa Tidak Hadir & Alasan" class="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border h-24"></textarea>
                <button onclick="window.saveJournal()" class="w-full py-5 tosca-gradient text-white rounded-3xl font-black uppercase shadow-xl mt-4">Simpan Jurnal</button>
            </div>`;
            document.getElementById('modal').classList.remove('hidden'); lucide.createIcons();
        };

        window.openAddAchievement = () => {
            const b = document.getElementById('modal-body'); document.getElementById('modal-title').innerText = "Catat Prestasi";
            b.innerHTML = `<div class="space-y-4">
                <select id="a-student" class="w-full p-4 bg-slate-50 rounded-2xl font-black outline-none border">
                    ${state.students.map(s => `<option value="${s.id}">${s.name} (${s.classes?.name})</option>`).join('')}
                </select>
                <input type="text" id="a-title" placeholder="Judul Prestasi" class="w-full p-4 bg-slate-50 rounded-2xl font-black outline-none border">
                <textarea id="a-desc" placeholder="Deskripsi" class="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border h-32"></textarea>
                <button onclick="window.saveAchievement()" class="w-full py-5 gold-gradient text-white rounded-3xl font-black uppercase shadow-xl mt-4">Simpan Prestasi</button>
            </div>`;
            document.getElementById('modal').classList.remove('hidden'); lucide.createIcons();
        };

        window.markAttendance = async (sid, status, notes = null) => {
            const today = new Date().toISOString().split('T')[0];
            const existing = state.attendance.find(a => a.student_id === sid);
            const payload = { student_id: sid, date: today, status: status || existing?.status || 'Hadir' };
            if (notes !== null) payload.notes = notes;
            const now = new Date().toISOString();
            if (state.manualMode === 'check_in') payload.check_in = existing?.check_in || now;
            else payload.check_out = existing?.check_out || now;
            const { error } = await supabaseClient.from('attendance').upsert(payload, { onConflict: 'student_id,date' });
            if (!error) { await window.fetchData(); window.notify("Tersimpan"); }
        };

        window.sendWA = (name, phone, status, notes) => {
            if (!phone || phone === "null" || phone === "") return window.notify("No WA Belum Diisi", "error");
            const session = state.manualMode === 'check_in' ? 'MASUK' : 'PULANG';
            const msg = `*LAPORAN ABSENSI SISWA*\n\nAnanda: *${name}*\nStatus: *${status.toUpperCase()}* (${session})\nTanggal: ${new Intl.DateTimeFormat('id-ID', { dateStyle: 'full' }).format(new Date())}\n${notes ? '_Catatan: ' + notes + '_' : ''}\n\nTerima kasih.`;
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
        };

        window.toggleScanner = async () => {
            const btn = document.getElementById('scan-btn');
            if (state.scanner && state.scanner.getState() === 2) { await state.scanner.stop(); state.scanner = null; btn.innerText = "Aktifkan Kamera"; return; }
            state.scanner = new Html5Qrcode("reader");
            try {
                await state.scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => {
                    const s = state.students.find(x => x.nisn === txt);
                    if (s) { window.markAttendance(s.id, 'Hadir'); window.notify(`QR Berhasil: ${s.name}`); }
                });
                btn.innerText = "Matikan Kamera";
            } catch (err) { window.notify("Gagal Kamera", "error"); }
        };

        window.handleExcelImport = async (e) => {
            const file = e.target.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = async (evt) => {
                const data = evt.target.result; const workbook = XLSX.read(data, { type: 'binary' });
                const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                window.notify(`Memproses ${rows.length} data...`);
                for (let row of rows) {
                    const cl = state.classes.find(c => c.name.toLowerCase() === (row.class_name || "").toLowerCase());
                    if (cl) await supabaseClient.from('students').insert([{ name: row.name, nisn: String(row.nisn), class_id: cl.id, gender: row.gender, parent_phone: String(row.parent_phone || "") }]);
                }
                window.notify("Import Selesai"); await window.fetchData();
            };
            reader.readAsBinaryString(file);
        };

        window.downloadQR = (nisn, name) => {
            const container = document.getElementById('qr-hidden-container'); container.innerHTML = '';
            new QRCode(container, { text: nisn, width: 300, height: 300 });
            setTimeout(() => {
                const img = container.querySelector('img'); const link = document.createElement('a');
                link.download = `QR_${name}.png`; link.href = img.src; link.click();
            }, 500);
        };

        window.updateSettings = async () => {
            const sets = [
                { key: 'check_in_start', value: document.getElementById('s-in-s').value },
                { key: 'check_in_end', value: document.getElementById('s-in-e').value },
                { key: 'check_out_start', value: document.getElementById('s-out-s').value },
                { key: 'check_out_end', value: document.getElementById('s-out-e').value }
            ];
            const { error } = await supabaseClient.from('settings').upsert(sets, { onConflict: 'key' });
            if (!error) window.notify("Pengaturan Diperbarui");
        };

        function render() {
            const nav = document.getElementById('nav-links');
            nav.innerHTML = pages.map(p => `
                <button onclick="window.navigate('${p.id}')" class="w-full flex items-center gap-5 px-6 py-5 rounded-4xl transition-all text-xs font-black uppercase tracking-widest ${state.currentPage === p.id ? 'sidebar-item-active' : 'text-white/60 hover:bg-white/5'}">
                    <i data-lucide="${p.icon}" class="w-5 h-5"></i> ${p.label}
                </button>
            `).join('');
            
            document.getElementById('page-title').innerText = pages.find(p => p.id === state.currentPage)?.label || '';
            document.getElementById('current-date-display').innerText = new Intl.DateTimeFormat('id-ID', { dateStyle: 'full' }).format(new Date());
            const container = document.getElementById('content');
            if (state.isLoading) { container.innerHTML = `<div class="h-full flex flex-col items-center justify-center gap-6"><div class="w-16 h-16 border-[6px] border-slate-100 border-t-tosca animate-spin rounded-full"></div><p class="font-black text-tosca text-[11px] uppercase tracking-widest">Memuat...</p></div>`; return; }
            
            switch(state.currentPage) {
                case 'dashboard': renderDashboard(container); break;
                case 'classes': renderClasses(container); break;
                case 'students': renderStudents(container); break;
                case 'attendance': renderAttendance(container); break;
                case 'journals': renderJournals(container); break;
                case 'achievements': renderAchievements(container); break;
                case 'settings': renderSettings(container); break;
            }
            lucide.createIcons();
        }

        function renderDashboard(c) {
            const h = state.attendance.filter(a => a.status === 'Hadir').length;
            const s = state.attendance.filter(a => a.status === 'Sakit').length;
            const i = state.attendance.filter(a => a.status === 'Izin').length;
            const a = state.attendance.filter(a => a.status === 'Alpa').length;
            
            c.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                    ${statCard('Total Siswa', state.students.length, 'users', 'tosca')}
                    ${statCard('Hadir Hari Ini', h, 'check-circle', 'tosca')}
                    ${statCard('Jurnal Guru', state.journals.length, 'book-open', 'tosca')}
                    ${statCard('Prestasi', state.achievements.length, 'award', 'tosca')}
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    ${statCard('Sakit', s, 'thermometer', 'gold')}
                    ${statCard('Izin', i, 'clipboard-edit', 'gold')}
                    ${statCard('Alpa', a, 'user-x', 'gold')}
                </div>

                <div class="tosca-gradient p-10 md:p-16 rounded-5xl shadow-2xl relative overflow-hidden text-white group border-4 border-white/10">
                    <div class="relative z-10 flex flex-col md:flex-row justify-between items-center gap-10">
                        <div class="text-center md:text-left">
                            <h3 class="text-3xl md:text-5xl font-black mb-4 tracking-tighter uppercase leading-tight">
                                Selamat Datang di <br/>
                                <span class="text-gold-light">Portal Absensi Online</span>
                            </h3>
                            <p class="text-white/70 font-medium mb-8 max-w-md mx-auto md:mx-0">
                                Pantau kehadiran, catat jurnal KBM, dan dokumentasikan prestasi siswa MA Al Qomariyah dalam satu platform terpadu.
                            </p>
                            <button onclick="window.navigate('attendance')" class="px-10 py-5 bg-white text-tosca rounded-2xl font-black uppercase tracking-widest shadow-xl hover:scale-105 active:scale-95 transition-all">
                                Mulai Absensi
                            </button>
                        </div>
                        
                        <!-- Digital Clock Section -->
                        <div class="bg-black/20 backdrop-blur-md p-10 rounded-4xl border border-white/10 text-center min-w-[280px] shadow-inner">
                            <p id="digital-date" class="text-[10px] font-black uppercase tracking-[0.3em] text-gold-light mb-2"></p>
                            <div id="digital-clock" class="text-5xl md:text-6xl font-black tracking-tighter text-white drop-shadow-2xl">
                                00:00:00
                            </div>
                            <div class="mt-4 flex justify-center gap-2">
                                <span class="w-2 h-2 rounded-full bg-gold animate-pulse"></span>
                                <span class="text-[8px] font-black uppercase tracking-widest text-white/50">Sistem Waktu Real-time</span>
                            </div>
                        </div>
                    </div>
                    <i data-lucide="clock" class="absolute -right-10 -bottom-10 w-80 h-80 text-white/5 rotate-12 group-hover:rotate-0 transition-transform duration-1000"></i>
                </div>
            `;
        }

        function statCard(t, v, i, theme) {
            return `<div class="bg-white p-6 rounded-4xl border border-slate-100 shadow-sm flex items-center gap-5 border-b-4 ${theme === 'tosca' ? 'border-tosca' : 'border-gold'}">
                <div class="w-14 h-14 ${theme === 'tosca' ? 'tosca-gradient' : 'gold-gradient'} text-white rounded-3xl flex items-center justify-center shadow-lg"><i data-lucide="${i}" class="w-6 h-6"></i></div>
                <div><p class="text-[9px] font-black uppercase text-slate-400 tracking-tighter">${t}</p><p class="text-2xl font-black text-slate-800 tracking-tighter">${v}</p></div>
            </div>`;
        }

        function renderClasses(c) {
            c.innerHTML = `<div class="bg-white p-8 rounded-5xl shadow-xl border border-slate-100">
                <div class="flex justify-between items-center mb-8">
                    <h3 class="text-lg font-black text-tosca uppercase tracking-tighter">Data Kelas</h3>
                    <button onclick="window.openAddClass()" class="px-6 py-3 tosca-gradient text-white rounded-2xl font-black text-[10px] uppercase shadow-xl">+ Tambah Kelas</button>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    ${state.classes.map(cl => {
                        const count = state.students.filter(s => s.class_id === cl.id).length;
                        const L = state.students.filter(s => s.class_id === cl.id && s.gender === 'L').length;
                        const P = state.students.filter(s => s.class_id === cl.id && s.gender === 'P').length;
                        const absToday = state.attendance.filter(a => state.students.find(s => s.id === a.student_id && s.class_id === cl.id));
                        const h = absToday.filter(a => a.status === 'Hadir').length;
                        const s = absToday.filter(a => a.status === 'Sakit').length;
                        const i = absToday.filter(a => a.status === 'Izin').length;
                        const al = absToday.filter(a => a.status === 'Alpa').length;
                        return `<div class="p-6 bg-slate-50 rounded-4xl border border-slate-100 relative group">
                            <div class="flex justify-between items-start mb-4">
                                <span class="font-black text-xl text-slate-800 uppercase">${cl.name}</span>
                                <button onclick="window.deleteData('classes', '${cl.id}')" class="text-rose-400 hover:bg-rose-50 p-2 rounded-xl transition-all"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </div>
                            <div class="space-y-3">
                                <div class="flex justify-between text-[10px] font-bold text-slate-500 uppercase border-b pb-2"><span>Siswa</span><span>${count} (${L}L / ${P}P)</span></div>
                                <div class="grid grid-cols-2 gap-2">
                                    <div class="p-2 bg-emerald-50 rounded-xl text-center"><p class="text-[8px] font-black text-emerald-600 uppercase">Hadir</p><p class="text-sm font-black text-emerald-800">${h}</p></div>
                                    <div class="p-2 bg-amber-50 rounded-xl text-center"><p class="text-[8px] font-black text-amber-600 uppercase">S/I/A</p><p class="text-sm font-black text-amber-800">${s+i+al}</p></div>
                                </div>
                            </div>
                        </div>`;
                    }).join('')}
                </div>
            </div>`;
        }

        function renderStudents(c) {
            c.innerHTML = `<div class="bg-white p-8 rounded-5xl shadow-xl border border-slate-100">
                <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                    <h3 class="text-lg font-black text-tosca uppercase tracking-tighter">Data Siswa</h3>
                    <div class="flex gap-2">
                        <button onclick="document.getElementById('excel-input').click()" class="px-5 py-3 bg-slate-100 text-slate-600 rounded-2xl font-black text-[10px] uppercase">Import Excel</button>
                        <button onclick="window.openAddStudent()" class="px-6 py-3 tosca-gradient text-white rounded-2xl font-black text-[10px] uppercase shadow-xl">+ Siswa</button>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                    ${state.students.map(s => `
                        <div class="bg-slate-50 p-5 rounded-4xl border border-slate-100 flex items-center justify-between group">
                            <div class="min-w-0">
                                <p class="font-black text-slate-800 truncate text-sm uppercase">${s.name}</p>
                                <p class="text-[9px] font-bold uppercase text-tosca/70">${s.classes?.name || '-'} • ${s.nisn} (${s.gender})</p>
                            </div>
                            <div class="flex gap-1">
                                <button onclick="window.downloadQR('${s.nisn}', '${s.name}')" title="Download QR" class="p-2 bg-white text-tosca rounded-xl shadow-sm hover:gold-gradient hover:text-white transition-all"><i data-lucide="qr-code" class="w-3.5 h-3.5"></i></button>
                                <button onclick="window.openEditStudent('${s.id}')" class="p-2 bg-white text-gold rounded-xl shadow-sm hover:gold-gradient hover:text-white transition-all"><i data-lucide="edit-3" class="w-3.5 h-3.5"></i></button>
                                <button onclick="window.deleteData('students', '${s.id}')" class="p-2 bg-white text-rose-400 rounded-xl shadow-sm hover:bg-rose-500 hover:text-white transition-all"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
                            </div>
                        </div>`).join('')}
                </div>
            </div>`;
        }

        function renderAttendance(c) {
            c.innerHTML = `<div class="space-y-8">
                <div class="flex bg-white p-2 rounded-5xl shadow-xl border border-slate-100 w-full max-w-sm mx-auto">
                    <button onclick="window.state.absensiType='manual'; window.fetchData()" class="flex-1 py-4 rounded-4xl text-xs font-black uppercase transition-all ${state.absensiType === 'manual' ? 'tosca-gradient text-white' : 'text-slate-400'}">Manual</button>
                    <button onclick="window.state.absensiType='qr'; window.fetchData()" class="flex-1 py-4 rounded-4xl text-xs font-black uppercase transition-all ${state.absensiType === 'qr' ? 'tosca-gradient text-white' : 'text-slate-400'}">Scan QR</button>
                </div>
                ${state.absensiType === 'manual' ? renderManualSection() : renderQRSection()}
            </div>`;
        }

        function renderManualSection() {
            const filtered = state.students.filter(s => (state.selectedClass === '' || s.class_id === state.selectedClass));
            return `<div class="tosca-gradient p-8 md:p-10 rounded-5xl shadow-2xl overflow-x-auto border-4 border-white/10">
                <div class="flex flex-col md:flex-row gap-6 mb-10 items-end min-w-[500px]">
                    <div class="flex-1">
                        <label class="text-[10px] font-black text-gold-light uppercase mb-3 block tracking-widest">Pilih Sesi</label>
                        <div class="flex bg-white/10 p-1.5 rounded-2xl border border-white/5">
                            <button onclick="window.state.manualMode='check_in'; window.fetchData()" class="flex-1 py-3 text-[10px] font-black rounded-xl transition-all ${state.manualMode === 'check_in' ? 'bg-white text-tosca shadow-xl' : 'text-white/40'} uppercase">Masuk</button>
                            <button onclick="window.state.manualMode='check_out'; window.fetchData()" class="flex-1 py-3 text-[10px] font-black rounded-xl transition-all ${state.manualMode === 'check_out' ? 'bg-white text-tosca shadow-xl' : 'text-white/40'} uppercase">Pulang</button>
                        </div>
                    </div>
                    <div class="flex-1">
                        <label class="text-[10px] font-black text-gold-light uppercase mb-3 block tracking-widest">Filter Kelas</label>
                        <select onchange="window.state.selectedClass=this.value; window.fetchData()" class="w-full p-4 bg-white/10 text-white rounded-2xl font-black text-sm outline-none border border-white/10">
                            <option value="" class="text-slate-800">Semua Kelas</option>
                            ${state.classes.map(cl => `<option value="${cl.id}" class="text-slate-800" ${state.selectedClass === cl.id ? 'selected' : ''}>${cl.name}</option>`).join('')}
                        </select>
                    </div>
                </div>
                <table class="w-full min-w-[600px] text-white">
                    <thead class="text-left text-[9px] font-black text-white/30 uppercase tracking-[0.2em] border-b border-white/10">
                        <tr><th class="pb-6">Nama Siswa</th><th class="pb-6 text-center">Status</th><th class="pb-6">Keterangan</th><th class="pb-6 text-right">Aksi</th></tr>
                    </thead>
                    <tbody class="divide-y divide-white/5">
                        ${filtered.map(s => {
                            const att = state.attendance.find(a => a.student_id === s.id);
                            return `<tr>
                                <td class="py-5"><p class="font-black text-sm uppercase">${s.name}</p><p class="text-[8px] font-bold text-gold-light uppercase">${s.nisn} • ${s.gender}</p></td>
                                <td class="py-5 text-center">
                                    <select onchange="window.markAttendance('${s.id}', this.value)" class="p-2.5 bg-white/5 border border-white/10 rounded-xl text-[9px] font-black uppercase text-gold-light outline-none">
                                        <option value="Hadir" class="text-slate-800" ${att?.status === 'Hadir' ? 'selected' : ''}>Hadir</option>
                                        <option value="Sakit" class="text-slate-800" ${att?.status === 'Sakit' ? 'selected' : ''}>Sakit</option>
                                        <option value="Izin" class="text-slate-800" ${att?.status === 'Izin' ? 'selected' : ''}>Izin</option>
                                        <option value="Alpa" class="text-slate-800" ${att?.status === 'Alpa' ? 'selected' : ''}>Alpa</option>
                                    </select>
                                </td>
                                <td class="py-5"><input placeholder="Tulis alasan..." value="${att?.notes || ''}" onblur="window.markAttendance('${s.id}', null, this.value)" class="w-full p-3 bg-white/5 rounded-xl text-[10px] font-bold text-white outline-none border border-white/10 focus:border-gold"></td>
                                <td class="py-5 text-right"><button onclick="window.sendWA('${s.name}', '${s.parent_phone}', '${att?.status || 'Hadir'}', '${att?.notes || ''}')" class="p-3 gold-gradient text-white rounded-2xl shadow-lg active:scale-90 transition-all"><i data-lucide="message-circle" class="w-4 h-4"></i></button></td>
                            </tr>`;
                        }).join('')}
                    </tbody>
                </table>
            </div>`;
        }

        function renderQRSection() {
            return `<div class="bg-white p-12 rounded-5xl border border-slate-100 shadow-2xl text-center max-w-sm mx-auto">
                <div id="reader" class="mx-auto w-full aspect-square mb-8 rounded-4xl overflow-hidden border-4 border-slate-50 flex items-center justify-center bg-slate-50"><i data-lucide="scan" class="w-16 h-16 text-tosca/10"></i></div>
                <button id="scan-btn" onclick="window.toggleScanner()" class="w-full py-5 tosca-gradient text-white rounded-2xl font-black uppercase shadow-xl tracking-widest">Mulai Scan</button>
            </div>`;
        }

        function renderJournals(c) {
            c.innerHTML = `<div class="bg-white p-8 rounded-5xl shadow-xl border border-slate-100">
                <div class="flex justify-between items-center mb-8">
                    <h3 class="text-lg font-black text-tosca uppercase tracking-tighter">Jurnal Harian Guru</h3>
                    <button onclick="window.openAddJournal()" class="px-6 py-3 tosca-gradient text-white rounded-2xl font-black text-[10px] uppercase shadow-xl">+ Catat Jurnal</button>
                </div>
                <div class="space-y-4">
                    ${state.journals.map(j => `<div class="p-6 bg-slate-50 rounded-4xl border border-slate-100 flex justify-between items-start group relative">
                        <div>
                            <div class="flex items-center gap-3 mb-2">
                                <span class="px-3 py-1 bg-tosca text-white text-[8px] font-black rounded-lg uppercase">${new Date(j.date).toLocaleDateString('id-ID')}</span>
                                <span class="px-3 py-1 bg-gold text-white text-[8px] font-black rounded-lg uppercase">Pertemuan ${j.meeting_number}</span>
                            </div>
                            <h4 class="font-black text-slate-800 uppercase text-sm">${j.subject}: ${j.topic}</h4>
                            <p class="text-[9px] font-bold text-tosca uppercase mb-4">${j.teacher_name} • ${j.classes?.name}</p>
                            <p class="text-xs text-slate-500 line-clamp-2">${j.activity}</p>
                            ${j.absent_notes ? `<p class="mt-3 text-[9px] font-bold text-rose-500 uppercase">Absen: ${j.absent_notes}</p>` : ''}
                        </div>
                        <button onclick="window.deleteData('journals', '${j.id}')" class="text-rose-300 hover:text-rose-500 p-2"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </div>`).join('')}
                </div>
            </div>`;
        }

        function renderAchievements(c) {
            c.innerHTML = `<div class="bg-white p-8 rounded-5xl shadow-xl border border-slate-100">
                <div class="flex justify-between items-center mb-8">
                    <h3 class="text-lg font-black text-gold uppercase tracking-tighter">Prestasi & Penghargaan</h3>
                    <button onclick="window.openAddAchievement()" class="px-6 py-3 gold-gradient text-white rounded-2xl font-black text-[10px] uppercase shadow-xl">+ Catat Prestasi</button>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    ${state.achievements.map(a => `<div class="p-6 bg-amber-50 rounded-4xl border border-amber-100 relative group overflow-hidden">
                        <i data-lucide="award" class="absolute -right-5 -bottom-5 w-24 h-24 text-amber-200/50 group-hover:scale-125 transition-all"></i>
                        <div class="relative z-10 flex justify-between">
                            <div>
                                <p class="font-black text-amber-900 text-sm uppercase">${a.title}</p>
                                <p class="text-[9px] font-bold uppercase text-amber-600/70 mb-4">${a.students?.name}</p>
                                <p class="text-xs text-amber-800/60 leading-relaxed">${a.description}</p>
                            </div>
                            <button onclick="window.deleteData('achievements', '${a.id}')" class="text-rose-400 p-2 hover:bg-rose-100 rounded-xl"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                    </div>`).join('')}
                </div>
            </div>`;
        }

        function renderSettings(c) {
            c.innerHTML = `<div class="bg-white p-8 rounded-5xl shadow-xl border border-slate-100 max-w-xl mx-auto">
                <h3 class="text-lg font-black uppercase text-slate-800 mb-8 text-center tracking-widest">Pengaturan Jam Absen</h3>
                <div class="space-y-6">
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="text-[9px] font-black text-tosca uppercase mb-2 block">Masuk Mulai</label><input type="time" id="s-in-s" value="${state.settings.check_in_start}" class="w-full p-4 bg-slate-50 rounded-2xl font-black outline-none border"></div>
                        <div><label class="text-[9px] font-black text-tosca uppercase mb-2 block">Masuk Selesai</label><input type="time" id="s-in-e" value="${state.settings.check_in_end}" class="w-full p-4 bg-slate-50 rounded-2xl font-black outline-none border"></div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="text-[9px] font-black text-gold uppercase mb-2 block">Pulang Mulai</label><input type="time" id="s-out-s" value="${state.settings.check_out_start}" class="w-full p-4 bg-slate-50 rounded-2xl font-black outline-none border"></div>
                        <div><label class="text-[9px] font-black text-gold uppercase mb-2 block">Pulang Selesai</label><input type="time" id="s-out-e" value="${state.settings.check_out_end}" class="w-full p-4 bg-slate-50 rounded-2xl font-black outline-none border"></div>
                    </div>
                    <button onclick="window.updateSettings()" class="w-full py-5 tosca-gradient text-white rounded-3xl font-black uppercase shadow-xl mt-4">Simpan Pengaturan</button>
                </div>
            </div>`;
        }

        document.addEventListener('DOMContentLoaded', () => {
            window.fetchData();
            startDigitalClock();
        });
        window.state = state;
    </script>
</body>
</html>
