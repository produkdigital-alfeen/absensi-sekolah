<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ABSENSI SISWA ONLINE</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d9488">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        tosca: '#0d9488',
                        'tosca-dark': '#0f766e',
                        gold: '#d97706',
                        'gold-light': '#f59e0b',
                    },
                    borderRadius: {
                        '4xl': '2rem',
                        '5xl': '3rem',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .tosca-gradient { background: linear-gradient(135deg, #0d9488 0%, #14b8a6 100%); }
        .gold-gradient { background: linear-gradient(135deg, #d97706 0%, #fbbf24 100%); }
        .sidebar-item-active { background: white; color: #0d9488; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #0d9488; border-radius: 10px; }
        .modal-overlay { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(8px); }
        
        @media (max-width: 768px) {
            .mobile-sidebar { transform: translateX(-100%); transition: transform 0.3s ease-in-out; }
            .mobile-sidebar.open { transform: translateX(0); }
        }
    </style>
</head>
<body class="text-slate-800 antialiased overflow-hidden">

    <!-- Mobile Overlay -->
    <div id="sidebar-overlay" onclick="window.toggleMobileMenu()" class="fixed inset-0 bg-slate-900/50 z-[45] hidden backdrop-blur-sm"></div>

    <div id="app" class="flex h-screen w-full overflow-hidden">
        <!-- Sidebar -->
        <aside id="sidebar" class="w-72 tosca-gradient text-white fixed md:relative h-full z-50 flex flex-col shrink-0 transition-transform mobile-sidebar shadow-2xl">
            <div class="p-8 border-b border-white/10 text-center">
                <div class="p-2 bg-white rounded-5xl shadow-xl border-4 border-gold inline-block mb-4">
                    <img id="school-logo" src="logo alqom.png"
                         alt="Logo" class="w-20 h-20 object-contain"
                         onerror="this.src='https://placehold.co/200x200/0d9488/ffffff?text=LOGO'">
                </div>
                <h1 class="text-lg font-black leading-tight tracking-tighter uppercase">Absensi Online 1.0</h1>
                <h2 class="text-lg font-black text-gold-light leading-tight tracking-tighter uppercase">MA Al Qomariyah</h2>
            </div>
            
            <nav class="flex-1 p-6 space-y-2 overflow-y-auto custom-scroll" id="nav-links"></nav>

            <div class="p-6 border-t border-white/10">
                <div class="bg-white/10 p-4 rounded-2xl flex items-center gap-3 border border-white/5">
                    <div id="status-dot" class="w-2.5 h-2.5 rounded-full bg-slate-400"></div>
                    <span id="status-text" class="text-[10px] font-bold uppercase tracking-widest text-white/70">Connecting...</span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col min-w-0 bg-slate-50 overflow-hidden relative">
            <header class="bg-white border-b border-slate-100 p-4 flex justify-between items-center shrink-0 z-40 shadow-sm">
                <div class="flex items-center gap-4">
                    <button onclick="window.toggleMobileMenu()" class="md:hidden p-3 bg-teal-50 text-tosca rounded-2xl">
                        <i data-lucide="menu" class="w-5 h-5"></i>
                    </button>
                    <div>
                        <h2 id="page-title" class="text-[10px] font-black text-tosca/40 uppercase tracking-[0.3em]">Dashboard</h2>
                        <p class="text-xs font-bold text-slate-400" id="current-date-display"></p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="window.fetchData()" class="p-3 bg-teal-50 text-tosca rounded-2xl hover:bg-teal-100 active:scale-90 transition-all">
                        <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                    </button>
                </div>
            </header>

            <div id="content" class="flex-1 overflow-y-auto p-4 md:p-10 custom-scroll"></div>
        </main>
    </div>

    <!-- Modal Base -->
    <div id="modal" class="fixed inset-0 z-[100] modal-overlay hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-xl rounded-5xl shadow-2xl overflow-hidden border border-teal-50">
            <div class="p-8 tosca-gradient text-white flex justify-between items-center">
                <h3 id="modal-title" class="text-xl font-black uppercase tracking-tighter">Tambah Data</h3>
                <button onclick="window.closeModal()" class="p-2 hover:bg-white/20 rounded-full"><i data-lucide="x"></i></button>
            </div>
            <div id="modal-body" class="p-8 max-h-[75vh] overflow-y-auto custom-scroll bg-white"></div>
        </div>
    </div>

    <div id="notification-container" class="fixed bottom-6 right-6 left-6 md:left-auto z-[200] flex flex-col gap-3"></div>
    <div id="qr-hidden-container" class="hidden"></div>
    <input type="file" id="excel-input" class="hidden" accept=".xlsx, .xls" onchange="window.handleExcelImport(event)">

    <script type="module">
        const SUPABASE_URL = 'https://jmtyhlpnzposejasobcv.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_OSleH0Z2_JjVnRx92O6c_Q_s19_ZGdL';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const state = {
            currentPage: 'dashboard',
            classes: [],
            students: [],
            attendance: [],
            journals: [],
            achievements: [],
            settings: { 
                check_in_start: '06:00', check_in_end: '08:00',
                check_out_start: '14:00', check_out_end: '17:00'
            },
            isLoading: true,
            isMenuOpen: false,
            absensiType: 'manual', 
            manualMode: 'check_in', 
            selectedClass: '',
            scanner: null
        };

        const pages = [
            { id: 'dashboard', label: 'Dashboard', icon: 'layout-dashboard' },
            { id: 'classes', label: 'Data Kelas', icon: 'layers' },
            { id: 'students', label: 'Data Siswa', icon: 'users' },
            { id: 'attendance', label: 'Absensi', icon: 'user-check' },
            { id: 'journals', label: 'Jurnal Guru', icon: 'book-open' },
            { id: 'achievements', label: 'Prestasi', icon: 'award' },
            { id: 'settings', label: 'Pengaturan', icon: 'settings' }
        ];

        // --- GLOBAL FUNCTIONS BINDING ---
        window.fetchData = async () => {
            state.isLoading = true;
            render();
            try {
                const today = new Date().toISOString().split('T')[0];
                const [cl, st, att, jr, ach, sett] = await Promise.all([
                    supabaseClient.from('classes').select('*').order('name'),
                    supabaseClient.from('students').select('*, classes(name)').order('name'),
                    supabaseClient.from('attendance').select('*').eq('date', today),
                    supabaseClient.from('journals').select('*, classes(name)').order('created_at', { ascending: false }),
                    supabaseClient.from('achievements').select('*, students(name)').order('created_at', { ascending: false }),
                    supabaseClient.from('settings').select('*')
                ]);

                state.classes = cl.data || [];
                state.students = st.data || [];
                state.attendance = att.data || [];
                state.journals = jr.data || [];
                state.achievements = ach.data || [];
                
                if (sett.data) {
                    sett.data.forEach(s => state.settings[s.key] = s.value);
                }

                document.getElementById('status-dot').className = 'w-2.5 h-2.5 rounded-full bg-emerald-400 animate-pulse';
                document.getElementById('status-text').innerText = 'Online';
            } catch (e) {
                console.error(e);
                window.notify("Koneksi Database Gagal", "error");
            } finally {
                state.isLoading = false;
                render();
            }
        };

        window.navigate = async (pageId) => {
            if (state.isMenuOpen) window.toggleMobileMenu();
            if (state.scanner) {
                try { if (state.scanner.getState() === 2) await state.scanner.stop(); } 
                catch (err) { console.warn(err); } 
                finally { state.scanner = null; }
            }
            state.currentPage = pageId;
            render();
        };

        window.toggleMobileMenu = () => {
            state.isMenuOpen = !state.isMenuOpen;
            document.getElementById('sidebar').classList.toggle('open', state.isMenuOpen);
            document.getElementById('sidebar-overlay').classList.toggle('hidden', !state.isMenuOpen);
        };

        window.closeModal = () => document.getElementById('modal').classList.add('hidden');
        
        window.notify = (msg, type = 'success') => {
            const container = document.getElementById('notification-container');
            const el = document.createElement('div');
            el.className = `p-5 rounded-2xl text-white font-bold text-xs uppercase tracking-widest shadow-2xl flex items-center gap-3 transition-all transform translate-y-10 opacity-0 ${type === 'success' ? 'tosca-gradient' : 'bg-rose-500'}`;
            el.innerHTML = `<i data-lucide="${type === 'success' ? 'check-circle' : 'alert-circle'}" class="w-4 h-4"></i> ${msg}`;
            container.appendChild(el);
            setTimeout(() => { el.classList.remove('translate-y-10', 'opacity-0'); }, 10);
            setTimeout(() => { 
                el.classList.add('translate-y-10', 'opacity-0');
                setTimeout(() => el.remove(), 500);
            }, 3000);
            lucide.createIcons();
        };

        // --- STREAMING_CHUNK:Defining CRUD Actions... ---
        window.saveClass = async () => {
            const name = document.getElementById('m-cl-name').value.trim();
            if(!name) return;
            const { error } = await supabaseClient.from('classes').insert([{ name }]);
            if (!error) { window.notify("Kelas Disimpan"); window.closeModal(); await window.fetchData(); }
        };

        window.saveStudent = async () => {
            const payload = { 
                name: document.getElementById('m-st-name').value, 
                nisn: document.getElementById('m-st-nisn').value, 
                class_id: document.getElementById('m-st-cl').value, 
                parent_phone: document.getElementById('m-st-ph').value 
            };
            const { error } = await supabaseClient.from('students').insert([payload]);
            if (!error) { window.notify("Siswa Disimpan"); window.closeModal(); await window.fetchData(); }
        };

        window.updateStudent = async (id) => {
            const payload = {
                name: document.getElementById('e-st-name').value,
                nisn: document.getElementById('e-st-nisn').value,
                class_id: document.getElementById('e-st-cl').value,
                parent_phone: document.getElementById('e-st-ph').value
            };
            const { error } = await supabaseClient.from('students').update(payload).eq('id', id);
            if (!error) {
                window.notify("Data Siswa Berhasil Diperbarui");
                window.closeModal();
                await window.fetchData();
            } else {
                window.notify("Gagal Update Data", "error");
            }
        };

        window.deleteData = async (table, id) => {
            if (!confirm("Apakah Anda yakin ingin menghapus data ini secara permanen?")) return;
            try {
                const { error } = await supabaseClient.from(table).delete().eq('id', id);
                if (error) throw error;
                window.notify("Data Berhasil Dihapus");
                await window.fetchData();
            } catch (e) {
                window.notify("Gagal Menghapus: " + e.message, "error");
            }
        };

        window.handleExcelImport = async (e) => {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = async (evt) => {
                const data = evt.target.result;
                const workbook = XLSX.read(data, { type: 'binary' });
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(sheet);
                
                window.notify(`Memproses ${rows.length} data siswa...`);
                for (let row of rows) {
                    const cl = state.classes.find(c => c.name.toLowerCase() === (row.class_name || "").toLowerCase());
                    if (cl) {
                        await supabaseClient.from('students').insert([{
                            name: row.name, nisn: String(row.nisn), class_id: cl.id, parent_phone: String(row.parent_phone || "")
                        }]);
                    }
                }
                window.notify("Import Selesai");
                await window.fetchData();
            };
            reader.readAsBinaryString(file);
        };

        window.downloadQR = (nisn, name) => {
            const container = document.getElementById('qr-hidden-container');
            container.innerHTML = '';
            new QRCode(container, { 
                text: String(nisn).trim(), 
                width: 512, 
                height: 512,
                correctLevel: QRCode.CorrectLevel.H 
            });
            setTimeout(() => {
                const img = container.querySelector('img');
                if (img) {
                    const link = document.createElement('a');
                    link.download = `QR_${name.replace(/\s+/g, '_')}.png`;
                    link.href = img.src;
                    link.click();
                    window.notify("QR Code kualitas tinggi siap");
                }
            }, 500);
        };

        // --- RECAP LOGIC ---
        window.getClassRecap = (classId) => {
            const classStudents = state.students.filter(s => s.class_id === classId);
            const total = classStudents.length;
            const classAtt = state.attendance.filter(a => classStudents.some(s => s.id === a.student_id));
            
            return {
                total,
                hadir: classAtt.filter(a => a.status === 'Hadir').length,
                sakit: classAtt.filter(a => a.status === 'Sakit').length,
                izin: classAtt.filter(a => a.status === 'Izin').length,
                alpa: classAtt.filter(a => a.status === 'Alpa').length
            };
        };

        window.runAIAnalysis = () => {
            const b = document.getElementById('modal-body');
            document.getElementById('modal-title').innerText = "AI Intelligence Report";
            
            // Mengumpulkan data per kelas untuk dianalisis
            const reportData = state.classes.map(cl => {
                const recap = window.getClassRecap(cl.id);
                const percent = recap.total > 0 ? Math.round((recap.hadir / recap.total) * 100) : 0;
                return { name: cl.name, ...recap, percent };
            });

            const totalHadir = reportData.reduce((a, b) => a + b.hadir, 0);
            const totalSiswa = state.students.length;
            const avgPercent = totalSiswa > 0 ? Math.round((totalHadir / totalSiswa) * 100) : 0;

            // Mencari Kelas Berprestasi & Bermasalah
            const bestClass = [...reportData].sort((a, b) => b.percent - a.percent)[0];
            const worstClass = [...reportData].sort((a, b) => a.percent - b.percent)[0];
            const mostSick = [...reportData].sort((a, b) => b.sakit - a.sakit)[0];
            const mostAlpa = [...reportData].sort((a, b) => b.alpa - a.alpa)[0];

            let aiInsights = "";
            let aiSuggestions = "";

            // LOGIKA ANALISIS (FREE AI ENGINE)
            if (avgPercent > 90) {
                aiInsights = "Tingkat kehadiran sekolah sangat luar biasa hari ini.";
                aiSuggestions = "Pertahankan ritme ini. Berikan apresiasi visual di mading untuk kelas dengan kehadiran 100%.";
            } else if (avgPercent > 70) {
                aiInsights = "Kehadiran stabil, namun terdapat beberapa titik lemah di kelas tertentu.";
                aiSuggestions = "Lakukan pengecekan acak ke kelas yang memiliki angka Alpa > 2 orang.";
            } else {
                aiInsights = "Kehadiran di bawah standar. Terdeteksi penurunan kedisiplinan massal.";
                aiSuggestions = "Segera kirimkan notifikasi WA massal kepada orang tua siswa yang berstatus Alpa.";
            }

            b.innerHTML = `
                <div class="space-y-8">
                    <div class="bg-teal-50 p-6 rounded-4xl border border-teal-100 flex items-center gap-6">
                        <div class="w-20 h-20 bg-white rounded-3xl shadow-sm flex items-center justify-center text-3xl font-black text-tosca">${avgPercent}%</div>
                        <div>
                            <h4 class="font-black text-slate-800 uppercase tracking-tighter">Skor Kedisiplinan Sekolah</h4>
                            <p class="text-xs font-medium text-slate-500">${aiInsights}</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="p-5 bg-emerald-50 rounded-3xl border border-emerald-100">
                            <p class="text-[9px] font-black text-emerald-600 uppercase mb-2">Kelas Terbaik</p>
                            <p class="font-black text-slate-800 text-lg">${bestClass?.name || '-'}</p>
                            <p class="text-[10px] font-bold text-emerald-500">${bestClass?.percent || 0}% Hadir</p>
                        </div>
                        <div class="p-5 bg-rose-50 rounded-3xl border border-rose-100">
                            <p class="text-[9px] font-black text-rose-600 uppercase mb-2">Perhatian Khusus</p>
                            <p class="font-black text-slate-800 text-lg">${mostAlpa?.alpa > 0 ? mostAlpa.name : '-'}</p>
                            <p class="text-[10px] font-bold text-rose-500">${mostAlpa?.alpa || 0} Siswa Alpa</p>
                        </div>
                    </div>

                    <div class="bg-amber-50 p-6 rounded-4xl border border-amber-100">
                        <div class="flex items-center gap-2 mb-4">
                            <i data-lucide="brain-circuit" class="text-amber-600 w-5 h-5"></i>
                            <h4 class="font-black text-amber-900 uppercase text-xs">Saran Strategis AI</h4>
                        </div>
                        <ul class="space-y-3">
                            <li class="flex gap-3 text-xs font-bold text-amber-800/80 italic">
                                <span class="w-5 h-5 bg-amber-200 rounded-full flex items-center justify-center shrink-0">1</span>
                                ${aiSuggestions}
                            </li>
                            ${mostSick?.sakit > 1 ? `
                            <li class="flex gap-3 text-xs font-bold text-amber-800/80 italic">
                                <span class="w-5 h-5 bg-amber-200 rounded-full flex items-center justify-center shrink-0">2</span>
                                Kelas ${mostSick.name} memiliki ${mostSick.sakit} siswa sakit. Sarankan ventilasi udara lebih baik.
                            </li>` : ''}
                            <li class="flex gap-3 text-xs font-bold text-amber-800/80 italic">
                                <span class="w-5 h-5 bg-amber-200 rounded-full flex items-center justify-center shrink-0">${mostSick?.sakit > 1 ? '3' : '2'}</span>
                                Gunakan fitur Kirim WA untuk ${mostAlpa?.name || 'siswa'} guna verifikasi alasan ketidakhadiran.
                            </li>
                        </ul>
                    </div>

                    <button onclick="window.closeModal()" class="w-full py-5 tosca-gradient text-white rounded-3xl font-black uppercase text-xs shadow-xl active:scale-95 transition-all">Selesai Membaca</button>
                </div>`;
            
            document.getElementById('modal').classList.remove('hidden');
            lucide.createIcons();
        };

        // --- RENDERERS ---
        function render() {
            const nav = document.getElementById('nav-links');
            nav.innerHTML = pages.map(p => `
                <button onclick="window.navigate('${p.id}')" class="w-full flex items-center gap-5 px-6 py-5 rounded-4xl transition-all text-xs font-black uppercase tracking-widest ${state.currentPage === p.id ? 'sidebar-item-active' : 'text-white/60 hover:bg-white/5'}">
                    <i data-lucide="${p.icon}" class="w-5 h-5"></i> ${p.label}
                </button>
            `).join('');
            
            document.getElementById('page-title').innerText = pages.find(p => p.id === state.currentPage)?.label || '';
            document.getElementById('current-date-display').innerText = new Intl.DateTimeFormat('id-ID', { dateStyle: 'full' }).format(new Date());
            
            const container = document.getElementById('content');
            if (state.isLoading) {
                container.innerHTML = `<div class="h-full flex flex-col items-center justify-center gap-6"><div class="w-16 h-16 border-[6px] border-slate-100 border-t-tosca animate-spin rounded-full"></div><p class="font-black text-tosca text-[11px] uppercase tracking-widest">Memuat Data...</p></div>`;
                return;
            }
            
            switch(state.currentPage) {
                case 'dashboard': renderDashboard(container); break;
                case 'classes': renderClasses(container); break;
                case 'students': renderStudents(container); break;
                case 'attendance': renderAttendance(container); break;
                case 'journals': renderJournals(container); break;
                case 'achievements': renderAchievements(container); break;
                case 'settings': renderSettings(container); break;
            }
            lucide.createIcons();
        }

        function renderDashboard(c) {
            const hadir = state.attendance.filter(a => a.status === 'Hadir').length;
            const sakit = state.attendance.filter(a => a.status === 'Sakit').length;
            const izin = state.attendance.filter(a => a.status === 'Izin').length;
            const alpa = state.attendance.filter(a => a.status === 'Alpa').length;

            c.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-6">
                    ${statCard('Siswa', state.students.length, 'users', 'tosca')}
                    ${statCard('Hadir', hadir, 'check-circle', 'tosca')}
                    ${statCard('Jurnal', state.journals.length, 'book-open', 'tosca')}
                    ${statCard('Prestasi', state.achievements.length, 'award', 'tosca')}
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                    ${statCard('Sakit (Hari Ini)', sakit, 'thermometer', 'gold')}
                    ${statCard('Izin (Hari Ini)', izin, 'clipboard-edit', 'gold')}
                    ${statCard('Alpa (Hari Ini)', alpa, 'user-x', 'gold')}
                </div>
                <div class="tosca-gradient p-12 rounded-5xl shadow-2xl relative overflow-hidden text-white group">
                    <div class="relative z-10">
                        <h3 class="text-4xl font-black mb-4 tracking-tighter uppercase">Portal Absensi <br/><span class="text-gold-light">Online Siswa</span></h3>
                        <p class="text-white/70 font-medium mb-8 max-w-md">Pantau kehadiran, catatan harian guru, dan prestasi siswa secara real-time dari semua perangkat.</p>
                        <button onclick="window.navigate('attendance')" class="px-10 py-5 bg-white text-tosca rounded-2xl font-black uppercase tracking-widest shadow-xl hover:scale-105 transition-all">Mulai Absensi</button>
                    </div>
                    <i data-lucide="school" class="absolute -right-10 -bottom-10 w-80 h-80 text-white/5 rotate-12 transition-transform duration-700"></i>
                </div>`;
        }

        function statCard(t, v, i, theme) {
            return `
                <div class="bg-white p-8 rounded-4xl border border-slate-100 shadow-sm flex items-center gap-6 border-b-4 ${theme === 'tosca' ? 'border-tosca' : 'border-gold'}">
                    <div class="w-16 h-16 ${theme === 'tosca' ? 'tosca-gradient' : 'gold-gradient'} text-white rounded-3xl flex items-center justify-center shadow-lg"><i data-lucide="${i}" class="w-8 h-8"></i></div>
                    <div><p class="text-[10px] font-black uppercase text-slate-400 tracking-tighter">${t}</p><p class="text-3xl font-black text-slate-800 tracking-tighter">${v}</p></div>
                </div>`;
        }

        // --- STREAMING_CHUNK:Updated Render Classes with Recap... ---
        function renderClasses(c) {
            c.innerHTML = `
                <div class="bg-white p-6 md:p-10 rounded-5xl border border-slate-100 shadow-xl">

            const payload = { student_id: sid, date: today, status: status || existing?.status || 'Hadir' };
            if (notes !== null) payload.notes = notes;
            const now = new Date().toISOString();
            if (state.manualMode === 'check_in') payload.check_in = existing?.check_in || now;
            else payload.check_out = existing?.check_out || now;
            const { error } = await supabaseClient.from('attendance').upsert(payload, { onConflict: 'student_id,date' });
            if (!error) { await window.fetchData(); window.notify("Tersimpan"); }
        };

                            <div>
                                <label class="text-[10px] font-black text-gold uppercase mb-3 block">Jam Pulang (Mulai)</label>
                                <input type="time" id="s-out-s" value="${state.settings.check_out_start}" class="w-full p-4 bg-slate-50 rounded-2xl font-black outline-none">
                            </div>
                            <div>
                                <label class="text-[10px] font-black text-gold uppercase mb-3 block">Jam Pulang (Selesai)</label>
                                <input type="time" id="s-out-e" value="${state.settings.check_out_end}" class="w-full p-4 bg-slate-50 rounded-2xl font-black outline-none">
                            </div>
                        </div>
                        <button onclick="window.updateSettings()" class="w-full py-6 tosca-gradient text-white rounded-3xl font-black uppercase shadow-xl">Simpan Pengaturan</button>
                    </div>
                </div>`;
        }

        window.toggleScanner = async () => {
            const btn = document.getElementById('scan-btn');
            const readerEl = document.getElementById('reader');

            if (state.scanner && state.scanner.getState() === 2) { 
                await state.scanner.stop(); 
                state.scanner = null; 
                btn.innerText = "Aktifkan Kamera";
                readerEl.classList.remove('border-tosca');
                return; 
            }

            state.scanner = new Html5Qrcode("reader");
            
            const config = { 
                fps: 20, // Meningkatkan frame per second agar lebih halus
                qrbox: (viewPortWidth, viewPortHeight) => {
                    const size = Math.min(viewPortWidth, viewPortHeight) * 0.7;
                    return { width: size, height: size };
                },
                aspectRatio: 1.0
            };

            try {
                await state.scanner.start(
                    { facingMode: "environment" }, 
                    config, 
                    (txt) => {
                        const cleanTxt = String(txt).trim();
                        const s = state.students.find(x => String(x.nisn).trim() === cleanTxt);
                        
                        if (s) { 
                            // Memberikan feedback visual saat berhasil scan
                            readerEl.classList.add('ring-8', 'ring-emerald-400', 'transition-all');
                            setTimeout(() => readerEl.classList.remove('ring-8', 'ring-emerald-400'), 500);
                            
                            window.markAttendance(s.id, 'Hadir'); 
                            window.notify(`Berhasil Absen: ${s.name}`);
                            
                            // Getar jika perangkat mendukung
                            if (navigator.vibrate) navigator.vibrate(100);
                        } else {
                            window.notify("Siswa tidak terdaftar: " + cleanTxt, "error");
                        }
                    }
                );
                btn.innerText = "Matikan Kamera";
                readerEl.classList.add('border-tosca');
            } catch (err) { 
                console.error(err);
                window.notify("Kamera gagal diakses. Pastikan izin diberikan.", "error"); 
            }
        };

        window.sendWA = (name, phone, status, notes) => {
            if (!phone || phone === "null" || phone === "undefined") return window.notify("No WA Belum Diisi", "error");
            const session = state.manualMode === 'check_in' ? 'MASUK' : 'PULANG';
            const msg = `*Bismillah...LAPORAN ABSENSI SISWA*\n\nAnanda: *${name}*\nStatus: *${status.toUpperCase()}* (${session})\nTanggal: ${new Intl.DateTimeFormat('id-ID', { dateStyle: 'full' }).format(new Date())}\n${notes ? '_Catatan: ' + notes + '_' : ''}\n\nSyukron.`;
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', window.fetchData);
        window.state = state;

    </script>
</body>
</html>
